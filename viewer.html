<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ノート閲覧</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; color: #111; background: #fff; }

        .toolbar {
            position: sticky; top: 0; z-index: 200;
            background: #f7f7f5; border-bottom: 1px solid #ddd;
            padding: 8px 14px; display: flex; align-items: center;
            gap: 10px; flex-wrap: wrap;
        }
        .toolbar label { font-size: 12px; color: #666; }
        .toolbar input[type=range] { width: 80px; }
        .toolbar .val { font-size: 12px; font-weight: bold; min-width: 30px; }
        .add-btn {
            background: #cc2222; color: #fff; border: none;
            border-radius: 6px; padding: 5px 12px;
            font-size: 12px; cursor: pointer;
        }
        .add-btn:hover { background: #aa1111; }
        .hint { font-size: 11px; color: #999; border-left: 2px solid #cc2222; padding-left: 7px; }

        .page-wrap {
            position: relative;
            padding: 20px 24px 60px;
            max-width: 820px; margin: 0 auto;
        }

        /* コンテンツ */
        .content { line-height: 1.8; font-size: 15px; }
        .content h1 { font-size: 20px; margin: 1.4rem 0 0.4rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        .content h2 { font-size: 17px; margin: 1.1rem 0 0.3rem; }
        .content h3 { font-size: 15px; margin: 0.8rem 0 0.2rem; }
        .content blockquote { border-left: 3px solid #ccc; padding-left: 12px; color: #555; margin: 4px 0; }
        .content hr { border: none; border-top: 1px solid #ddd; margin: 12px 0; }

        /* ==テキスト== → 赤文字（RGB値をシートと統一） */
        .red-mark { color: rgb(204, 34, 34); font-weight: bold; }

        /* 赤シート本体（初期背景色を文字と統一） */
        .red-sheet {
            position: absolute;
            background: rgba(204, 34, 34, 0.90);
            border-radius: 4px;
            border: 1.5px solid rgba(160,0,0,0.4);
            cursor: grab;
            z-index: 100;
            user-select: none;
            touch-action: none;
        }
        .red-sheet:active { cursor: grabbing; }
        .sheet-label {
            position: absolute; top: 3px; left: 8px;
            font-size: 10px; color: rgba(255,255,255,0.5);
            pointer-events: none;
        }
        .del-btn {
            position: absolute; top: 2px; right: 2px;
            width: 14px; height: 14px;
            background: rgba(0,0,0,0.3); border: none; border-radius: 50%;
            color: #fff; font-size: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .del-btn:hover { background: rgba(0,0,0,0.6); }
        .resize-handle {
            position: absolute; bottom: 0; right: 0;
            width: 16px; height: 16px;
            cursor: nwse-resize;
            display: flex; align-items: center; justify-content: center;
        }
        .resize-handle::after {
            content: ''; display: block;
            width: 8px; height: 8px;
            border-right: 2px solid rgba(255,255,255,0.5);
            border-bottom: 2px solid rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="add-btn" onclick="addSheet()">＋ 赤シートを追加</button>
    <label>透明度</label>
    <input type="range" id="opacity-sl" min="50" max="100" value="90"
           step="1" oninput="updateOpacity(this.value)">
    <span class="val" id="opacity-val">90%</span>
    <span class="hint">ドラッグで移動 ／ 右下コーナーでリサイズ</span>
</div>

<div class="page-wrap" id="page">
    <p style="margin-bottom:12px"><a href="index.html">← 教科一覧へ戻る</a></p>
    <div class="content" id="content">読み込み中...</div>
</div>

<script>
let sheetCount = 0;
let globalOpacity = 0.90;

/* スライダー操作時に文字と同じRGB値を維持して不透明度だけ変更 */
function updateOpacity(val) {
    globalOpacity = val / 100;
    document.getElementById('opacity-val').textContent = val + '%';
    document.querySelectorAll('.red-sheet').forEach(s => {
        s.style.background = `rgba(204,34,34,${globalOpacity})`;
    });
}

function addSheet() {
    sheetCount++;
    const page = document.getElementById('page');
    const sheet = document.createElement('div');
    sheet.className = 'red-sheet';

    const startX = 30 + (sheetCount % 4) * 20;
    const startY = 80 + (sheetCount % 5) * 40;

    /* 新規追加時も文字と同じRGB値を適用 */
    sheet.style.cssText =
        `left:${startX}px;top:${startY}px;width:300px;height:36px;` +
        `background:rgba(204,34,34,${globalOpacity});`;

    sheet.innerHTML = `
        <span class="sheet-label">シート${sheetCount}</span>
        <button class="del-btn" onclick="this.parentElement.remove()">×</button>
        <div class="resize-handle"></div>
    `;

    page.appendChild(sheet);
    makeDraggable(sheet);
    makeResizable(sheet);
}

function makeDraggable(el) {
    let ox, oy, sx, sy;
    function onDown(e) {
        if (e.target.closest('.resize-handle') || e.target.closest('.del-btn')) return;
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        ox = el.offsetLeft; oy = el.offsetTop;
        sx = pt.clientX;    sy = pt.clientY;
        el.style.cursor = 'grabbing';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onUp);
    }
    function onMove(e) {
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        const page = document.getElementById('page');
        const maxX = page.offsetWidth - el.offsetWidth;
        const maxY = page.scrollHeight - el.offsetHeight;
        el.style.left = Math.max(0, Math.min(maxX, ox + pt.clientX - sx)) + 'px';
        el.style.top  = Math.max(0, Math.min(maxY, oy + pt.clientY - sy)) + 'px';
    }
    function onUp() {
        el.style.cursor = 'grab';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
    }
    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onDown, {passive: false});
}

function makeResizable(el) {
    const rh = el.querySelector('.resize-handle');
    let sx, sy, sw, sh;
    function onDown(e) {
        e.preventDefault(); e.stopPropagation();
        const pt = e.touches ? e.touches[0] : e;
        sx = pt.clientX; sy = pt.clientY;
        sw = el.offsetWidth; sh = el.offsetHeight;
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onUp);
    }
    function onMove(e) {
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        el.style.width  = Math.max(60,  sw + pt.clientX - sx) + 'px';
        el.style.height = Math.max(20, sh + pt.clientY - sy) + 'px';
    }
    function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
    }
    rh.addEventListener('mousedown', onDown);
    rh.addEventListener('touchstart', onDown, {passive: false});
}

/* MD読み込み */
function processMarkdown(md) {
    const withMarks = md.replace(/==([\s\S]*?)==/g,
        (_, t) => `<RMSTART>${t}<RMEND>`);
    let html = marked.parse(withMarks);
    html = html.replace(/<RMSTART>/g, '<span class="red-mark">');
    html = html.replace(/<\/RMEND>/g, '</span>');
    return html;
}

const urlParams = new URLSearchParams(window.location.search);
const fileName = urlParams.get('file');
if (fileName) {
    fetch(`md/${fileName}.md`)
        .then(r => { if (!r.ok) throw new Error('ファイルが見つかりません'); return r.text(); })
        .then(md => {
            document.getElementById('content').innerHTML = processMarkdown(md);
            document.title = `${fileName} のノート`;
            addSheet();
        })
        .catch(e => {
            document.getElementById('content').innerHTML =
                `<p style="color:red;">エラー: ${e.message}</p>`;
        });
} else {
    document.getElementById('content').innerHTML = '<p>教科が指定されていません。</p>';
}
</script>
</body>
</html>
