<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ノート閲覧</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; color: #111; background: #fff; }

        .toolbar {
            position: sticky; top: 0; z-index: 200;
            background: #f7f7f5; border-bottom: 1px solid #ddd;
            padding: 8px 14px; display: flex; align-items: center;
            gap: 10px; flex-wrap: wrap;
        }
        .toolbar label { font-size: 12px; color: #666; }
        .toolbar input[type=range] { width: 80px; }
        .toolbar .val { font-size: 12px; font-weight: bold; min-width: 30px; }
        .add-btn {
            background: #ff0000; color: #fff; border: none;
            border-radius: 6px; padding: 5px 12px;
            font-size: 12px; cursor: pointer;
        }
        .add-btn:hover { background: #cc0000; }
        .hint { font-size: 11px; color: #999; border-left: 2px solid #ff0000; padding-left: 7px; }

        .page-wrap {
            position: relative;
            padding: 20px 24px 60px;
            max-width: 820px; margin: 0 auto;
        }

        .content { line-height: 1.8; font-size: 15px; position: relative; z-index: 1; }
        .content h1 { font-size: 20px; margin: 1.4rem 0 0.4rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        .content h2 { font-size: 17px; margin: 1.1rem 0 0.3rem; }
        .content h3 { font-size: 15px; margin: 0.8rem 0 0.2rem; }
        .content blockquote { border-left: 3px solid #ccc; padding-left: 12px; color: #555; margin: 4px 0; }
        .content hr { border: none; border-top: 1px solid #ddd; margin: 12px 0; }

        .red-mark { color: #ff0000; font-weight: bold; position: relative; }
        .red-mark::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ff0000;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.15s;
        }
        .red-mark.covered::after {
            opacity: 1;
        }

        .red-sheet {
            position: fixed;
            background: #ff0000; 
            border-radius: 4px;
            border: 1.5px solid rgba(160,0,0,0.4);
            cursor: grab;
            z-index: 1000; 
            user-select: none;
            touch-action: none;
            
            opacity: var(--sheet-opacity, 0.85);
        }
        .red-sheet:active { cursor: grabbing; }
        
        .sheet-label {
            position: absolute; top: 3px; left: 8px;
            font-size: 10px; color: #fff;
            opacity: 0.7;
            pointer-events: none;
        }
        .del-btn {
            position: absolute; top: 2px; right: 2px;
            width: 14px; height: 14px;
            background: #fff; border: none; border-radius: 50%;
            color: #ff0000; font-size: 10px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .del-btn:hover { background: #eee; }
        .resize-handle {
            position: absolute; bottom: 0; right: 0;
            width: 16px; height: 16px;
            cursor: nwse-resize;
            display: flex; align-items: center; justify-content: center;
        }
        .resize-handle::after {
            content: ''; display: block;
            width: 8px; height: 8px;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="add-btn" onclick="addSheet()">＋</button>
    <label>濃さ</label>
    <input type="range" id="opacity-sl" min="40" max="100" value="85"
           step="1" oninput="updateOpacity(this.value)">
    <span class="val" id="opacity-val">85%</span>
    <span class="hint">auauau</span>
</div>

<div class="page-wrap" id="page">
    <p style="margin-bottom:12px"><a href="index.html">←戻る</a></p>
    <div class="content" id="content">読み込みng</div>
</div>

<script>
let sheetCount = 0;
let globalOpacity = 0.85;

function updateOpacity(val) {
    globalOpacity = val / 100;
    document.getElementById('opacity-val').textContent = val + '%';
    document.querySelectorAll('.red-sheet').forEach(s => {
        s.style.setProperty('--sheet-opacity', globalOpacity);
    });
}

function addSheet() {
    sheetCount++;
    const page = document.getElementById('page');
    const sheet = document.createElement('div');
    sheet.className = 'red-sheet';
    
    const pageRect = page.getBoundingClientRect();
    const startX = pageRect.left + 30 + (sheetCount % 4) * 20;
    const startY = pageRect.top + 80 + (sheetCount % 5) * 40;

    sheet.style.cssText =
        `left:${startX}px;top:${startY}px;width:300px;height:36px;` +
        `--sheet-opacity:${globalOpacity};`;

    sheet.innerHTML = `
        <span class="sheet-label">シート${sheetCount}</span>
        <button class="del-btn" onclick="this.parentElement.remove()">×</button>
        <div class="resize-handle"></div>
    `;

    document.body.appendChild(sheet);
    makeDraggable(sheet);
    makeResizable(sheet);
}

function makeDraggable(el) {
    let ox, oy, sx, sy;
    function onDown(e) {
        if (e.target.closest('.resize-handle') || e.target.closest('.del-btn')) return;
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        ox = el.offsetLeft; oy = el.offsetTop;
        sx = pt.clientX;    sy = pt.clientY;
        el.style.cursor = 'grabbing';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onUp);
    }
    function onMove(e) {
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        const maxX = window.innerWidth - el.offsetWidth;
        const maxY = window.innerHeight - el.offsetHeight;
        el.style.left = Math.max(0, Math.min(maxX, ox + pt.clientX - sx)) + 'px';
        el.style.top  = Math.max(0, Math.min(maxY, oy + pt.clientY - sy)) + 'px';
        updateCoveredText();
    }
    function onUp() {
        el.style.cursor = 'grab';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
    }
    el.addEventListener('mousedown', onDown);
    el.addEventListener('touchstart', onDown, {passive: false});
}

function makeResizable(el) {
    const rh = el.querySelector('.resize-handle');
    let sx, sy, sw, sh;
    function onDown(e) {
        e.preventDefault(); e.stopPropagation();
        const pt = e.touches ? e.touches[0] : e;
        sx = pt.clientX; sy = pt.clientY;
        sw = el.offsetWidth; sh = el.offsetHeight;
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, {passive: false});
        document.addEventListener('touchend', onUp);
    }
    function onMove(e) {
        e.preventDefault();
        const pt = e.touches ? e.touches[0] : e;
        el.style.width  = Math.max(60,  sw + pt.clientX - sx) + 'px';
        el.style.height = Math.max(20, sh + pt.clientY - sy) + 'px';
        updateCoveredText();
    }
    function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
    }
    rh.addEventListener('mousedown', onDown);
    rh.addEventListener('touchstart', onDown, {passive: false});
}

function updateCoveredText() {
    const sheets = document.querySelectorAll('.red-sheet');
    const redMarks = document.querySelectorAll('.red-mark');
    
    redMarks.forEach(mark => {
        let isCovered = false;
        const markRect = mark.getBoundingClientRect();
        
        sheets.forEach(sheet => {
            const sheetRect = sheet.getBoundingClientRect();
            
            if (!(markRect.right < sheetRect.left || 
                  markRect.left > sheetRect.right || 
                  markRect.bottom < sheetRect.top || 
                  markRect.top > sheetRect.bottom)) {
                isCovered = true;
            }
        });
        
        if (isCovered) {
            mark.classList.add('covered');
        } else {
            mark.classList.remove('covered');
        }
    });
}

function processMarkdown(md) {
    const withMarks = md.replace(/==([\s\S]*?)==/g,
        (_, t) => `<RMSTART>${t}<RMEND>`);
    let html = marked.parse(withMarks);
    html = html.replace(/<RMSTART>/g, '<span class="red-mark">');
    html = html.replace(/<\/RMEND>/g, '</span>');
    return html;
}

const urlParams = new URLSearchParams(window.location.search);
const fileName = urlParams.get('file');
if (fileName) {
    fetch(`md/${fileName}.md`)
        .then(r => { if (!r.ok) throw new Error('ファイルが見つからん'); return r.text(); })
        .then(md => {
            document.getElementById('content').innerHTML = processMarkdown(md);
            document.title = `${fileName} のノート`;
            addSheet();
            setTimeout(updateCoveredText, 100);
        })
        .catch(e => {
            document.getElementById('content').innerHTML =
                `<p style="color:red;">エラー: ${e.message}</p>`;
        });
} else {
    document.getElementById('content').innerHTML = '<p>教科が指定されとらん。</p>';
}
</script>
</body>
</html>
